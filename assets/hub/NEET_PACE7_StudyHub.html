<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET PACE-7 · Study Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Spline+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3eee3; --bg2:#ece5d6; --panel:#fffdf8; --panel2:#faf5ea;
  --ink:#2d2a24; --muted:#6c655a; --dim:#9c9483; --line:#e5ddcb;
  --gold:#b8893b; --acc:#3b5bdb; --acc-soft:rgba(59,91,219,.10);
  --green:#2f9e6e; --red:#d0533f; --amber:#c47b1e;
  --disp:'Fraunces',serif; --body:'Spline Sans',sans-serif; --mono:'JetBrains Mono',monospace;
  --grid:rgba(120,108,78,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.62;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:36px 36px;-webkit-font-smoothing:antialiased}
.wrap{max-width:980px;margin:0 auto;padding:0 18px 110px}
.view{display:none;animation:fade .42s ease}
.view.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.crumb{font-family:var(--mono);font-size:.74rem;color:var(--dim);padding:20px 0 6px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.crumb a{color:var(--gold);cursor:pointer;text-decoration:none}
.crumb a:hover{text-decoration:underline}
.crumb .sep{color:var(--line)}

/* ===== HOME ===== */
.hero{text-align:center;padding:42px 0 30px}
.hero .kick{font-family:var(--mono);font-size:.72rem;letter-spacing:.34em;color:var(--gold);text-transform:uppercase}
.hero h1{font-family:var(--disp);font-weight:700;font-size:clamp(2.3rem,7vw,3.7rem);line-height:1.02;margin:12px 0 8px;letter-spacing:-.01em}
.hero p{color:var(--muted);font-size:1rem}
.hero .exam{display:inline-block;margin-top:16px;font-family:var(--mono);font-size:.73rem;color:var(--ink);
  background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:7px 15px}
.subjects{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-top:14px}
.subj{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px 22px;cursor:pointer;
  position:relative;overflow:hidden;transition:.25s;box-shadow:0 1px 2px rgba(60,50,30,.04)}
.subj:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(60,50,30,.12)}
.subj::after{content:'';position:absolute;left:0;top:0;width:5px;height:100%;background:var(--sc)}
.subj .ico{font-size:2rem;display:block;margin-bottom:10px}
.subj h3{font-family:var(--disp);font-weight:600;font-size:1.4rem;color:var(--ink)}
.subj .meta{font-family:var(--mono);font-size:.72rem;color:var(--dim);margin-top:4px}
.subj .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.subj .chip{font-family:var(--mono);font-size:.68rem;color:var(--sc);background:var(--scs);border-radius:20px;padding:4px 10px}

/* ===== SUBJECT (chapter list) ===== */
.shdr{display:flex;align-items:center;gap:14px;margin:8px 0 24px}
.shdr .ico{font-size:2.2rem}
.shdr h2{font-family:var(--disp);font-weight:600;font-size:2rem}
.chapters{display:grid;gap:14px}
.chap{background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--acc);border-radius:16px;
  padding:20px 22px;cursor:pointer;transition:.22s;display:flex;justify-content:space-between;align-items:center;gap:16px}
.chap:hover{transform:translateX(5px);box-shadow:0 10px 26px rgba(60,50,30,.10)}
.chap h3{font-family:var(--disp);font-weight:600;font-size:1.3rem}
.chap p{color:var(--muted);font-size:.88rem;margin-top:3px}
.chap .stat{font-family:var(--mono);font-size:.72rem;color:var(--dim);text-align:right;flex:0 0 auto}
.chap .stat b{display:block;font-size:1.5rem;color:var(--acc);font-weight:700}
.chap .go{font-size:1.5rem;color:var(--acc)}

/* ===== CHAPTER VIEW ===== */
.chdr{margin:4px 0 18px}
.chdr h2{font-family:var(--disp);font-weight:700;font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.05}
.chdr .tagline{color:var(--muted);font-size:.92rem;margin-top:4px}
.tabs{position:sticky;top:0;z-index:40;background:rgba(243,238,227,.93);backdrop-filter:blur(8px);
  display:flex;gap:8px;padding:12px 0;margin-bottom:18px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:0 0 auto;font-family:var(--mono);font-size:.78rem;color:var(--muted);background:var(--panel);
  border:1px solid var(--line);padding:9px 15px;border-radius:10px;cursor:pointer;transition:.18s;font-weight:500}
.tabs button:hover{color:var(--ink);border-color:var(--acc)}
.tabs button.on{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
.tabpane{display:none}
.tabpane.on{display:block;animation:fade .35s}

/* points */
.grouphdr{font-family:var(--mono);font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);
  margin:26px 0 13px;display:flex;align-items:center;gap:10px}
.grouphdr::before{content:'';width:22px;height:2px;background:var(--acc);border-radius:2px}
.grouphdr:first-child{margin-top:6px}
.pt{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:12px;
  padding:14px 16px;margin-bottom:11px;position:relative;transition:.18s}
.pt:hover{border-left-color:var(--gold);transform:translateX(3px)}
.pt .pno{font-family:var(--mono);font-size:.68rem;color:var(--dim);position:absolute;top:11px;right:14px}
.pt h4{font-family:var(--disp);font-weight:600;font-size:1.04rem;margin-bottom:4px;padding-right:34px}
.pt p{color:var(--muted);font-size:.93rem}
.pt .eg{margin-top:8px;font-size:.85rem;color:#8a5a12;background:rgba(196,123,30,.08);border:1px dashed rgba(196,123,30,.3);
  border-radius:7px;padding:7px 10px}
.pt .eg b{color:var(--amber)}
.f{font-family:var(--mono);background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:1px 7px;
  color:var(--acc);font-size:.88em;display:inline-block;font-weight:500}

/* widgets */
.lab{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin:0 0 22px;position:relative;overflow:hidden}
.lab::before{content:'LIVE';position:absolute;top:14px;right:16px;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;
  color:var(--green);border:1px solid var(--green);border-radius:20px;padding:3px 8px}
.lab h4{font-family:var(--disp);font-weight:600;font-size:1.12rem}
.lab .d{color:var(--dim);font-size:.85rem;margin-bottom:14px}
.ctrl{display:flex;align-items:center;gap:12px;margin:10px 0}
.ctrl label{font-family:var(--mono);font-size:.78rem;color:var(--muted);min-width:120px}
.ctrl input[type=range]{flex:1;accent-color:var(--acc);height:5px}
.ctrl .v{font-family:var(--mono);font-size:.84rem;color:var(--amber);min-width:62px;text-align:right;font-weight:700}
.readout{font-family:var(--mono);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:13px;font-size:.9rem;line-height:1.85}
.readout .big{color:var(--green);font-size:1.2rem;font-weight:700}
.toggle{display:flex;gap:8px;margin:12px 0}
.toggle button{flex:1;font-family:var(--mono);font-size:.8rem;padding:9px;border-radius:9px;border:1px solid var(--line);
  background:var(--bg2);color:var(--muted);cursor:pointer;transition:.18s}
.toggle button.on{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:700}
svg{width:100%;height:auto;display:block}
.note{font-family:var(--mono);font-size:.74rem;color:var(--dim);margin-top:10px;text-align:center}

/* flashcards */
.fcwrap{perspective:1400px;margin:14px auto;max-width:560px}
.fc{position:relative;height:260px;cursor:pointer;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,.2,.2,1)}
.fc.flip{transform:rotateY(180deg)}
.fc .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;padding:24px 22px 32px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;border:1px solid var(--line);box-shadow:0 6px 20px rgba(60,50,30,.07);overflow-y:auto}
.fc .front{background:var(--panel)}
.fc .back{background:linear-gradient(160deg,var(--panel2),#fff);transform:rotateY(180deg);border-color:var(--acc)}
.fc .q{font-family:var(--disp);font-size:1.2rem;font-weight:600;color:var(--ink)}
.fc .a{font-size:1rem;color:var(--acc);font-weight:500}
.fc .hint{position:absolute;bottom:13px;font-family:var(--mono);font-size:.64rem;color:var(--dim);letter-spacing:.14em}
.fcbar{display:flex;justify-content:space-between;align-items:center;max-width:560px;margin:14px auto 0;gap:14px}
.fcbar button{font-family:var(--mono);font-size:.82rem;padding:9px 18px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);cursor:pointer;transition:.18s}
.fcbar button:hover{border-color:var(--acc);color:var(--acc)}
.fcbar .prog{font-family:var(--mono);font-size:.8rem;color:var(--muted)}

/* quiz */
.quiz{max-width:660px;margin:0 auto}
.qbanner{font-family:var(--mono);font-size:.78rem;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
  border-radius:12px;padding:11px 14px;margin-bottom:14px;text-align:center}
.qbanner b{color:var(--acc)}
.qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 4px 18px rgba(60,50,30,.05)}
.qmeta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.76rem;color:var(--dim);margin-bottom:14px}
.qmeta .sc{color:var(--green);font-weight:700}
.qtext{font-family:var(--disp);font-size:1.16rem;font-weight:600;margin-bottom:18px;line-height:1.45}
.qtext .f{font-size:.92rem}
.opt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:11px;
  padding:13px 15px;margin-bottom:10px;color:var(--ink);font-family:var(--body);font-size:.95rem;cursor:pointer;transition:.15s}
.opt:hover:not(:disabled){border-color:var(--acc);background:#fff}
.opt .k{font-family:var(--mono);color:var(--acc);font-weight:700;margin-right:9px}
.opt.correct{border-color:var(--green);background:rgba(47,158,110,.12)}
.opt.correct .k{color:var(--green)}
.opt.wrong{border-color:var(--red);background:rgba(208,83,63,.10)}
.opt.wrong .k{color:var(--red)}
.opt:disabled{cursor:default}
.expl{margin-top:14px;background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;
  padding:13px 15px;font-size:.9rem;color:var(--muted);display:none;line-height:1.6}
.expl.show{display:block;animation:fade .3s}
.expl b{color:var(--amber)}
.qrow{display:flex;gap:10px;margin-top:18px}
.qnext,.qend{flex:1;font-family:var(--mono);font-weight:700;font-size:.9rem;padding:13px;border-radius:11px;border:none;cursor:pointer;transition:.18s}
.qnext{background:var(--acc);color:#fff;display:none}
.qnext.show{display:block}
.qnext:hover{filter:brightness(1.08)}
.qend{background:transparent;color:var(--muted);border:1px solid var(--line);flex:0 0 auto;padding:13px 16px}
.qend:hover{border-color:var(--red);color:var(--red)}
.qdone{text-align:center;padding:24px}
.qdone .scbig{font-family:var(--disp);font-size:3rem;font-weight:700;color:var(--green)}
.qdone .msg{color:var(--muted);margin:8px 0 18px}
.btnbig{font-family:var(--mono);font-weight:700;font-size:.92rem;padding:13px 22px;border-radius:11px;border:none;
  background:var(--acc);color:#fff;cursor:pointer}
footer{text-align:center;color:var(--dim);font-family:var(--mono);font-size:.73rem;margin-top:44px;padding-top:22px;border-top:1px solid var(--line)}
.empty{text-align:center;color:var(--dim);font-family:var(--mono);padding:40px;font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="crumb" id="crumb"></div>

  <!-- HOME -->
  <div class="view show" id="v-home">
    <div class="hero">
      <div class="kick">Sri Gosalites · NEET</div>
      <h1>PACE-7 Study Hub</h1>
      <p>Pick a subject, pick a chapter, then learn → flip → test yourself.</p>
      <span class="exam">Exam: 31 May 2026 (Sun) · 5–8 PM · 180 Q</span>
    </div>
    <div class="subjects" id="subjects"></div>
  </div>

  <!-- SUBJECT -->
  <div class="view" id="v-subject">
    <div class="shdr"><span class="ico" id="sIco"></span><h2 id="sName"></h2></div>
    <div class="chapters" id="chapters"></div>
  </div>

  <!-- CHAPTER -->
  <div class="view" id="v-chapter">
    <div class="chdr"><h2 id="cName"></h2><div class="tagline" id="cTag"></div></div>
    <div class="tabs" id="ctabs"></div>
    <div class="tabpane on" id="tp-concepts"></div>
    <div class="tabpane" id="tp-visualize"></div>
    <div class="tabpane" id="tp-flash"></div>
    <div class="tabpane" id="tp-quiz"></div>
  </div>

  <footer>SRI GOSALITES · NEET PACE-7 · Self-study Hub</footer>
</div>

<script>
/* ================= ENGINE ================= */
const SUBJECTS={
  physics:{name:'Physics',icon:'⚡',color:'#3b5bdb',soft:'rgba(59,91,219,.10)'},
  chemistry:{name:'Chemistry',icon:'⚗️',color:'#0f8a7e',soft:'rgba(15,138,126,.10)'},
  botany:{name:'Botany',icon:'🌿',color:'#4a8c3f',soft:'rgba(74,140,63,.12)'},
  zoology:{name:'Zoology',icon:'🧬',color:'#c2683a',soft:'rgba(194,104,58,.12)'}
};
const DATA={physics:{},chemistry:{},botany:{},zoology:{}};
const WIDGETS={};
const App={
  register(subj,key,obj){DATA[subj][key]=obj;},
  start(){buildHome();}
};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function countPts(ch){return (ch.groups||[]).reduce((s,g)=>s+g.pts.length,0);}
function poolSize(ch){const stat=(ch.quiz||[]).length,gens=(ch.gen||[]).length;return gens?Math.max(50,stat):stat;}

function setView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  document.getElementById(id).classList.add('show');window.scrollTo({top:0,behavior:'smooth'});}

/* ---- HOME ---- */
function buildHome(){
  const box=document.getElementById('subjects');box.innerHTML='';
  Object.keys(SUBJECTS).forEach(sk=>{
    const s=SUBJECTS[sk];const chs=DATA[sk];const keys=Object.keys(chs);
    const d=document.createElement('div');d.className='subj';
    d.style.setProperty('--sc',s.color);d.style.setProperty('--scs',s.soft);
    let chips=keys.length?keys.map(k=>`<span class="chip">${chs[k].chapterName}</span>`).join(''):'<span class="chip">coming soon</span>';
    d.innerHTML=`<span class="ico">${s.icon}</span><h3>${s.name}</h3>
      <div class="meta">${keys.length} chapter${keys.length!=1?'s':''} loaded</div>
      <div class="chips">${chips}</div>`;
    d.onclick=()=>keys.length&&openSubject(sk);
    box.appendChild(d);
  });
  crumb([['Home',null]]);
}
function crumb(parts){
  document.getElementById('crumb').innerHTML=parts.map((p,i)=>{
    const last=i===parts.length-1;
    const el=last?`<span>${p[0]}</span>`:`<a onclick="${p[1]}">${p[0]}</a>`;
    return el+(last?'':'<span class="sep">›</span>');
  }).join('');
}

/* ---- SUBJECT ---- */
function openSubject(sk){
  const s=SUBJECTS[sk];document.documentElement.style.setProperty('--acc',s.color);
  document.documentElement.style.setProperty('--acc-soft',s.soft);
  document.getElementById('sIco').textContent=s.icon;
  document.getElementById('sName').textContent=s.name;
  const box=document.getElementById('chapters');box.innerHTML='';
  const chs=DATA[sk];
  Object.keys(chs).forEach(ck=>{
    const ch=chs[ck];const c=document.createElement('div');c.className='chap';
    c.innerHTML=`<div><h3>${ch.chapterName}</h3><p>${ch.tagline||''}</p></div>
      <div class="stat"><b>${countPts(ch)}</b>points · ${poolSize(ch)}+ Q</div><div class="go">→</div>`;
    c.onclick=()=>openChapter(sk,ck);
    box.appendChild(c);
  });
  crumb([['Home','buildHome();setView(\'v-home\')'],[s.name,null]]);
  setView('v-subject');
}

/* ---- CHAPTER ---- */
let CUR=null;
function openChapter(sk,ck){
  const ch=DATA[sk][ck];CUR={sk,ck,ch};const s=SUBJECTS[sk];
  document.documentElement.style.setProperty('--acc',s.color);
  document.documentElement.style.setProperty('--acc-soft',s.soft);
  document.getElementById('cName').textContent=ch.chapterName;
  document.getElementById('cTag').textContent=ch.tagline||'';
  buildTabs();renderConcepts(ch);renderVisualize(ch);renderFlash(ch);renderQuizIntro(ch);
  showTab('concepts');
  crumb([['Home','buildHome();setView(\'v-home\')'],[s.name,'openSubject(\''+sk+'\')'],[ch.chapterName,null]]);
  setView('v-chapter');
}
function buildTabs(){
  const t=document.getElementById('ctabs');
  const tabs=[['concepts','① Concepts'],['visualize','② Visualize'],['flash','③ Flashcards'],['quiz','④ Self-Test']];
  t.innerHTML='';
  tabs.forEach(x=>{const b=document.createElement('button');b.textContent=x[1];b.onclick=()=>showTab(x[0]);b.dataset.t=x[0];t.appendChild(b);});
}
function showTab(name){
  document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('on'));
  document.getElementById('tp-'+name).classList.add('on');
  document.querySelectorAll('#ctabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===name));
  window.scrollTo({top:0,behavior:'smooth'});
}

/* concepts */
function renderConcepts(ch){
  let h='',n=1;
  (ch.groups||[]).forEach(g=>{
    h+=`<div class="grouphdr">${g.g}</div>`;
    g.pts.forEach(p=>{h+=`<div class="pt"><span class="pno">#${n}</span><h4>${p.t}</h4><p>${p.d}</p>${p.e?`<div class="eg"><b>e.g.</b> ${p.e}</div>`:''}</div>`;n++;});
  });
  document.getElementById('tp-concepts').innerHTML=h||'<div class="empty">No concepts yet.</div>';
}
/* visualize */
function renderVisualize(ch){
  const box=document.getElementById('tp-visualize');box.innerHTML='';
  const ws=ch.widgets||[];
  if(!ws.length){box.innerHTML='<div class="empty">No animations for this chapter.</div>';return;}
  ws.forEach((wid,i)=>{
    if(!WIDGETS[wid])return;
    const cont=document.createElement('div');cont.className='lab';cont.id='w_'+wid+'_'+i;
    cont.innerHTML=WIDGETS[wid].html(cont.id);
    box.appendChild(cont);
    try{WIDGETS[wid].init(cont.id);}catch(e){console.warn('widget',wid,e);}
  });
}
/* flashcards */
let FC={list:[],i:0};
function buildFlash(ch){
  // start with the polished question-style cards
  const list=(ch.flash||[]).map(c=>[c[0],c[1]]);
  // then auto-add one card per concept point (term -> explanation + trick)
  (ch.groups||[]).forEach(g=>g.pts.forEach(p=>{
    let back=p.d;
    if(p.e&&p.e.trim())back+=' <span style="color:var(--amber);display:block;margin-top:8px">▸ '+p.e+'</span>';
    list.push([p.t,back]);
  }));
  return list;
}
function renderFlash(ch){
  FC.list=buildFlash(ch);FC.i=0;
  const box=document.getElementById('tp-flash');
  if(!FC.list.length){box.innerHTML='<div class="empty">No flashcards yet.</div>';return;}
  box.innerHTML=`<div class="qbanner"><b>${FC.list.length}</b> flashcards · every concept point + key recall cards · tap to flip</div>
    <div class="fcwrap"><div class="fc" id="fc" onclick="this.classList.toggle('flip')">
    <div class="face front"><div class="q" id="fcQ"></div><span class="hint">TAP TO REVEAL</span></div>
    <div class="face back"><div class="a" id="fcA"></div><span class="hint">TAP TO HIDE</span></div></div></div>
    <div class="fcbar"><button onclick="fcMove(-1)">‹ Prev</button><span class="prog" id="fcProg"></span><button onclick="fcMove(1)">Next ›</button></div>
    <div style="text-align:center;margin-top:12px"><button class="qend" style="display:inline-block;flex:none" onclick="fcShuffle()">🔀 Shuffle deck</button></div>`;
  fcShow();
}
function fcShow(){const f=document.getElementById('fc');if(!f)return;f.classList.remove('flip');
  document.getElementById('fcQ').innerHTML=FC.list[FC.i][0];document.getElementById('fcA').innerHTML=FC.list[FC.i][1];
  document.getElementById('fcProg').textContent=(FC.i+1)+' / '+FC.list.length;}
function fcMove(d){FC.i=(FC.i+d+FC.list.length)%FC.list.length;fcShow();}
function fcShuffle(){shuffle(FC.list);FC.i=0;fcShow();}

/* ===== QUIZ ENGINE ===== */
let QZ={pool:[],idx:0,score:0,ch:null};
function buildPool(ch){
  let pool=(ch.quiz||[]).map(q=>({...q}));
  const gens=ch.gen||[];let guard=0;
  while(pool.length<50&&gens.length&&guard<800){pool.push(gens[guard%gens.length]());guard++;}
  pool=pool.map(q=>{
    const opts=q.o.map((txt,i)=>({txt,ok:i===q.c}));shuffle(opts);
    return {q:q.q,opts,ex:q.ex,c:opts.findIndex(o=>o.ok)};
  });
  return shuffle(pool);
}
function renderQuizIntro(ch){
  const box=document.getElementById('tp-quiz');
  const genTxt=(ch.gen&&ch.gen.length)?' Includes auto-generated numericals with <b>fresh values every run</b>.':'';
  box.innerHTML=`<div class="quiz"><div class="qbanner">Pool of <b>${poolSize(ch)}+</b> twisted questions · options shuffled each time · no timer.${genTxt}</div>
    <div style="text-align:center;padding:18px 0"><button class="btnbig" onclick="startQuiz()">▶ Start Self-Test</button></div></div>`;
}
function startQuiz(){QZ.ch=CUR.ch;QZ.pool=buildPool(CUR.ch);QZ.idx=0;QZ.score=0;renderQ();}
function renderQ(){
  const box=document.getElementById('tp-quiz');
  if(QZ.idx>=QZ.pool.length){
    const pct=Math.round(QZ.score/QZ.pool.length*100);
    box.innerHTML=`<div class="quiz"><div class="qcard qdone"><div class="scbig">${QZ.score}/${QZ.pool.length}</div>
      <div class="msg">${pct>=80?'Excellent — exam ready! 🔥':pct>=50?'Good. Revise the missed traps and retry.':'Revisit the Concepts tab, then test again.'}</div>
      <button class="btnbig" onclick="startQuiz()">↻ New Set (fresh values)</button></div></div>`;return;
  }
  const Q=QZ.pool[QZ.idx];
  let opts=Q.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${'ABCD'[i]}</span>${o.txt}</button>`).join('');
  box.innerHTML=`<div class="quiz"><div class="qcard">
    <div class="qmeta"><span>Q ${QZ.idx+1} / ${QZ.pool.length}</span><span class="sc">Score ${QZ.score}</span></div>
    <div class="qtext">${Q.q}</div>${opts}
    <div class="expl" id="expl"><b>Why:</b> ${Q.ex}</div>
    <div class="qrow"><button class="qnext" id="qnext" onclick="QZ.idx++;renderQ()">${QZ.idx===QZ.pool.length-1?'See Result →':'Next →'}</button>
    <button class="qend" onclick="QZ.idx=QZ.pool.length;renderQ()">End</button></div></div></div>`;
  box.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i;box.querySelectorAll('.opt').forEach(x=>x.disabled=true);
    if(i===Q.c){b.classList.add('correct');QZ.score++;}
    else{b.classList.add('wrong');box.querySelectorAll('.opt')[Q.c].classList.add('correct');}
    document.getElementById('expl').classList.add('show');
    document.getElementById('qnext').classList.add('show');
    box.querySelector('.sc').textContent='Score '+QZ.score;
  });
}
document.addEventListener('DOMContentLoaded',()=>App.start());
</script>

  function draw(){const a=+r1.value,b=+r2.value,V=+e.value;
   document.getElementById(id+'_r1v').textContent=a+' Ω';document.getElementById(id+'_r2v').textContent=b+' Ω';document.getElementById(id+'_ev').textContent=V+' V';
   const svg=document.getElementById(id+'_svg');let s='';
   if(mode==='ser'){s=`<rect x="40" y="60" width="520" height="2" fill="#3b5bdb"/><rect x="40" y="120" width="520" height="2" fill="#3b5bdb"/>
    <line x1="40" y1="60" x2="40" y2="120" stroke="#3b5bdb" stroke-width="2"/><text x="14" y="95" fill="#c47b1e" font-family="JetBrains Mono" font-size="12">${V}V</text>
    <rect x="180" y="50" width="70" height="22" rx="4" fill="#faf5ea" stroke="#c47b1e"/><text x="198" y="66" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">${a}Ω</text>
    <rect x="350" y="50" width="70" height="22" rx="4" fill="#faf5ea" stroke="#c47b1e"/><text x="368" y="66" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">${b}Ω</text>`;
    const Req=a+b,I=V/Req;document.getElementById(id+'_out').innerHTML=`R_eq = R₁+R₂ = <span class="big">${Req} Ω</span><br>I = V/R_eq = <span style="color:#3b5bdb">${I.toFixed(2)} A</span> (same in both)<br>V₁=${(I*a).toFixed(1)}V , V₂=${(I*b).toFixed(1)}V`;
   }else{s=`<line x1="40" y1="90" x2="180" y2="90" stroke="#3b5bdb" stroke-width="2"/><line x1="420" y1="90" x2="560" y2="90" stroke="#3b5bdb" stroke-width="2"/>
    <line x1="180" y1="50" x2="180" y2="130" stroke="#3b5bdb" stroke-width="2"/><line x1="420" y1="50" x2="420" y2="130" stroke="#3b5bdb" stroke-width="2"/>
    <rect x="250" y="40" width="70" height="22" rx="4" fill="#faf5ea" stroke="#c47b1e"/><text x="268" y="56" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">${a}Ω</text>
    <line x1="180" y1="51" x2="250" y2="51" stroke="#3b5bdb" stroke-width="2"/><line x1="320" y1="51" x2="420" y2="51" stroke="#3b5bdb" stroke-width="2"/>
    <rect x="250" y="120" width="70" height="22" rx="4" fill="#faf5ea" stroke="#c47b1e"/><text x="268" y="136" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">${b}Ω</text>
    <line x1="180" y1="131" x2="250" y2="131" stroke="#3b5bdb" stroke-width="2"/><line x1="320" y1="131" x2="420" y2="131" stroke="#3b5bdb" stroke-width="2"/>
    <text x="14" y="95" fill="#c47b1e" font-family="JetBrains Mono" font-size="12">${V}V</text>`;
    const Req=a*b/(a+b),I=V/Req;document.getElementById(id+'_out').innerHTML=`R_eq = R₁R₂/(R₁+R₂) = <span class="big">${Req.toFixed(2)} Ω</span><br>Total I = <span style="color:#3b5bdb">${I.toFixed(2)} A</span><br>I₁=${(V/a).toFixed(1)}A , I₂=${(V/b).toFixed(1)}A (same V=${V}V)`;
   }svg.innerHTML=s;}
  document.getElementById(id+'_bs').onclick=function(){mode='ser';this.classList.add('on');document.getElementById(id+'_bp').classList.remove('on');draw();};
  document.getElementById(id+'_bp').onclick=function(){mode='par';this.classList.add('on');document.getElementById(id+'_bs').classList.remove('on');draw();};
  [r1,r2,e].forEach(x=>x.oninput=draw);draw();}
};
WIDGETS.wb={
 html:id=>`<h4>Balance the Bridge · P/Q = R/S</h4><p class="d">Adjust P, Q, R, S until the needle snaps to green “BALANCED” (P·S = Q·R).</p>
  <svg viewBox="0 0 600 300">
  <line x1="300" y1="45" x2="470" y2="150" stroke="#3b5bdb" stroke-width="3"/><line x1="470" y1="150" x2="300" y2="255" stroke="#3b5bdb" stroke-width="3"/>
  <line x1="300" y1="45" x2="130" y2="150" stroke="#3b5bdb" stroke-width="3"/><line x1="130" y1="150" x2="300" y2="255" stroke="#3b5bdb" stroke-width="3"/>
  <line x1="130" y1="150" x2="470" y2="150" stroke="#9c9483" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="372" y="90" fill="#c47b1e" font-family="JetBrains Mono" font-size="13" id="${id}_pl">P</text>
  <text x="385" y="218" fill="#c47b1e" font-family="JetBrains Mono" font-size="13" id="${id}_ql">Q</text>
  <text x="190" y="90" fill="#c47b1e" font-family="JetBrains Mono" font-size="13" id="${id}_rl">R</text>
  <text x="200" y="218" fill="#c47b1e" font-family="JetBrains Mono" font-size="13" id="${id}_sl">S</text>
  <circle cx="300" cy="45" r="6" fill="#2d2a24"/><circle cx="470" cy="150" r="6" fill="#2d2a24"/><circle cx="300" cy="255" r="6" fill="#2d2a24"/><circle cx="130" cy="150" r="6" fill="#2d2a24"/>
  <circle cx="300" cy="150" r="26" fill="#faf5ea" stroke="#cfc6b2" stroke-width="2"/><text x="293" y="190" fill="#9c9483" font-size="11">G</text>
  <line id="${id}_nd" x1="300" y1="150" x2="300" y2="130" stroke="#d0533f" stroke-width="2.5"/><circle cx="300" cy="150" r="3" fill="#d0533f"/></svg>
  <div class="ctrl"><label>P</label><input type="range" id="${id}_p" min="1" max="20" value="4"><span class="v" id="${id}_pv">4 Ω</span></div>
  <div class="ctrl"><label>Q</label><input type="range" id="${id}_q" min="1" max="20" value="8"><span class="v" id="${id}_qv">8 Ω</span></div>
  <div class="ctrl"><label>R</label><input type="range" id="${id}_r" min="1" max="20" value="3"><span class="v" id="${id}_rv">3 Ω</span></div>
  <div class="ctrl"><label>S</label><input type="range" id="${id}_s" min="1" max="20" value="9"><span class="v" id="${id}_sv">9 Ω</span></div>
  <div class="readout">P/Q = <span id="${id}_pq"></span> &nbsp;|&nbsp; R/S = <span id="${id}_rs"></span><br><span class="big" id="${id}_st"></span></div>`,
 init:id=>{const P=document.getElementById(id+'_p'),Q=document.getElementById(id+'_q'),R=document.getElementById(id+'_r'),S=document.getElementById(id+'_s');
  function u(){const p=+P.value,q=+Q.value,r=+R.value,s=+S.value;
   document.getElementById(id+'_pv').textContent=p+' Ω';document.getElementById(id+'_qv').textContent=q+' Ω';document.getElementById(id+'_rv').textContent=r+' Ω';document.getElementById(id+'_sv').textContent=s+' Ω';
   document.getElementById(id+'_pl').textContent='P='+p;document.getElementById(id+'_ql').textContent='Q='+q;document.getElementById(id+'_rl').textContent='R='+r;document.getElementById(id+'_sl').textContent='S='+s;
   const pq=p/q,rs=r/s;document.getElementById(id+'_pq').textContent=pq.toFixed(2);document.getElementById(id+'_rs').textContent=rs.toFixed(2);
   const ang=Math.max(-60,Math.min(60,(p*s-q*r)*1.2)),rad=(ang-90)*Math.PI/180;
   document.getElementById(id+'_nd').setAttribute('x2',300+22*Math.cos(rad));document.getElementById(id+'_nd').setAttribute('y2',150+22*Math.sin(rad));
   const st=document.getElementById(id+'_st');
   if(Math.abs(pq-rs)<.02){st.textContent='✓ BALANCED — galvanometer reads ZERO';st.style.color='#2f9e6e';document.getElementById(id+'_nd').setAttribute('stroke','#2f9e6e');}
   else{st.textContent='⚠ UNBALANCED — current flows through G';st.style.color='#d0533f';document.getElementById(id+'_nd').setAttribute('stroke','#d0533f');}}
  [P,Q,R,S].forEach(x=>x.oninput=u);u();}
};
</script>

<script>
/* ===== PHYSICS · RAY OPTICS ===== */
App.register('physics','optics',{
chapterName:'Ray Optics',
tagline:'Lenses, simple & compound microscope, refracting & reflecting telescope',
widgets:['lens','tele'],
groups:[
 {g:'Lens & Image Basics',pts:[
  {t:'Cartesian sign convention',d:'Distances measured from the optical centre; against incident light = negative, along = positive. Heights up = +.',e:'Object distance u is taken negative.'},
  {t:'Thin lens formula',d:'<span class="f">1/v − 1/u = 1/f</span>. Relates object (u), image (v) and focal length (f).',e:''},
  {t:'Linear magnification',d:'<span class="f">m = v/u = h\u2032/h</span>. |m|&gt;1 magnified, negative = inverted.',e:''},
  {t:'Power of a lens',d:'<span class="f">P = 1/f</span> (f in metres), unit dioptre (D). Convex +, concave −.',e:'f = 25 cm → P = +4 D.'},
  {t:'Lensmaker\u2019s equation',d:'<span class="f">1/f = (n−1)(1/R₁ − 1/R₂)</span>.',e:'Higher refractive index → shorter f.'},
  {t:'Real vs virtual image',d:'Real: rays actually meet (can be projected), inverted. Virtual: rays appear to diverge, erect.',e:'Magnifying glass gives a virtual image.'},
  {t:'Least distance of distinct vision',d:'Near point <span class="f">D = 25 cm</span> for a normal eye — closest clear viewing distance.',e:''},
  {t:'Far point',d:'Farthest clear point = infinity for a normal eye.',e:''},
  {t:'Angular / magnifying power',d:'Ratio of angle subtended WITH instrument to angle WITHOUT it at the eye.',e:'This is what microscopes/telescopes report, not linear size.'},
 ]},
 {g:'Simple Microscope (magnifier)',pts:[
  {t:'What it is',d:'A single convex lens with the object placed within its focal length.',e:'A magnifying glass.'},
  {t:'Image formed',d:'Erect, virtual and magnified, on the same side as the object.',e:''},
  {t:'m — image at near point',d:'<span class="f">m = 1 + D/f</span> (eye strained, maximum magnification).',e:'f = 5 cm → m = 1 + 25/5 = 6.'},
  {t:'m — relaxed eye (image at ∞)',d:'<span class="f">m = D/f</span> (comfortable viewing).',e:'f = 5 cm → m = 25/5 = 5.'},
  {t:'Boosting magnification',d:'Use a lens of SHORTER focal length (higher power).',e:''},
 ]},
 {g:'Compound Microscope',pts:[
  {t:'Two-lens system',d:'Objective (small f_o) forms a real magnified image; eyepiece (small f_e) magnifies it further.',e:''},
  {t:'Objective\u2019s image',d:'Real, inverted, magnified — formed just inside the eyepiece\u2019s focus.',e:''},
  {t:'Eyepiece role',d:'Acts as a simple microscope on the objective\u2019s real image.',e:''},
  {t:'Total magnification',d:'<span class="f">m = m_o × m_e</span>.',e:''},
  {t:'m — image at near point',d:'<span class="f">m = (L/f_o)(1 + D/f_e)</span>, L = tube length.',e:''},
  {t:'m — relaxed eye',d:'<span class="f">m = (L/f_o)(D/f_e)</span>.',e:'Both f_o and f_e must be small for high m.'},
  {t:'Final image',d:'Virtual and inverted with respect to the object.',e:''},
 ]},
 {g:'Refracting Telescope (Astronomical)',pts:[
  {t:'Construction',d:'Objective: large aperture and LARGE f_o. Eyepiece: SMALL f_e.',e:''},
  {t:'Objective image',d:'Forms a real, inverted image of the distant object at its focus.',e:''},
  {t:'m — normal adjustment',d:'<span class="f">m = f_o/f_e</span> (final image at infinity, relaxed eye).',e:'f_o = 100 cm, f_e = 5 cm → m = 20.'},
  {t:'Tube length',d:'<span class="f">L = f_o + f_e</span> (normal adjustment).',e:''},
  {t:'m — image at near point',d:'<span class="f">m = (f_o/f_e)(1 + f_e/D)</span>.',e:''},
  {t:'High magnification needs',d:'LARGE f_o and SMALL f_e.',e:'Opposite of microscope, where both are small.'},
  {t:'Large aperture matters',d:'Gathers more light (brighter) and improves resolving power.',e:''},
  {t:'Final image',d:'Inverted (acceptable for stars).',e:''},
 ]},
 {g:'Reflecting Telescope',pts:[
  {t:'Concave mirror objective',d:'Uses a large concave (often parabolic) mirror instead of a lens — Cassegrain/Newtonian.',e:''},
  {t:'Magnification',d:'<span class="f">m = f_mirror / f_eyepiece</span>.',e:''},
  {t:'Key advantages',d:'No chromatic aberration; parabolic mirror removes spherical aberration; large mirrors are cheaper, lighter and easier to support; brighter.',e:'Why all big modern telescopes are reflectors.'},
  {t:'Cassegrain design',d:'A secondary convex mirror reflects light back through a hole in the primary to the eyepiece.',e:''},
 ]},
 {g:'Resolving Power & Variants',pts:[
  {t:'Magnifying ≠ resolving power',d:'Magnification enlarges; resolving power is the ability to separate two close points.',e:''},
  {t:'RP of microscope',d:'<span class="f">RP = 2μsinθ/1.22λ</span> — improves with shorter λ and wider cone.',e:'Why electron microscopes (tiny λ) resolve so much.'},
  {t:'RP of telescope',d:'<span class="f">RP = D/1.22λ</span> — larger aperture D → better resolution.',e:''},
  {t:'Terrestrial telescope',d:'Adds an erecting lens so the final image is ERECT (longer tube).',e:'For viewing objects on Earth.'},
  {t:'Galilean telescope',d:'Convex objective + CONCAVE eyepiece → gives an erect image, shorter tube.',e:''},
 ]}
],
flash:[
 ['Simple microscope, image at near point — m?','m = 1 + D/f'],
 ['Simple microscope, relaxed eye — m?','m = D/f'],
 ['Compound microscope total magnification?','m = m_o × m_e = (L/f_o)(D/f_e)'],
 ['Astronomical telescope, normal adjustment — m?','m = f_o / f_e'],
 ['Telescope tube length (normal adjustment)?','L = f_o + f_e'],
 ['High telescope magnification needs?','Large f_o, small f_e (large aperture)'],
 ['High compound-microscope magnification needs?','Both f_o and f_e small'],
 ['Objective of a reflecting telescope?','A concave (parabolic) mirror'],
 ['Main advantage of reflecting telescope?','No chromatic aberration (mirror, not lens)'],
 ['Thin lens formula?','1/v − 1/u = 1/f'],
 ['Power of a lens & unit?','P = 1/f (f in m), unit dioptre (D)'],

],
quiz:[
 {q:'In a simple microscope, the magnification with the image at the near point is:',o:['D/f','1 + D/f','f/D','1 − D/f'],c:1,ex:'Image at near point (strained eye): m = 1 + D/f.'},
 {q:'For a relaxed eye, a simple microscope gives magnification:',o:['1 + D/f','D/f','f/D','fD'],c:1,ex:'Relaxed eye → image at infinity → m = D/f.'},
 {q:'To increase the magnifying power of a simple microscope, use a lens of:',o:['Longer focal length','Shorter focal length','Larger aperture only','Lower refractive index'],c:1,ex:'m ∝ 1/f, so a shorter focal length (higher power) magnifies more.'},
 {q:'The final image in a compound microscope is:',o:['Real and erect','Virtual and erect','Virtual and inverted','Real and inverted'],c:2,ex:'Final image is virtual and inverted with respect to the object.'},
 {q:'Total magnification of a compound microscope equals:',o:['m_o + m_e','m_o × m_e','m_o − m_e','m_o / m_e'],c:1,ex:'The two lenses multiply: m = m_o × m_e.'},
 {q:'For high magnification in a COMPOUND MICROSCOPE you need:',o:['Large f_o and f_e','Both f_o and f_e small','Large f_o, small f_e','Small f_o, large f_e'],c:1,ex:'Microscope: both objective and eyepiece focal lengths should be small.'},
 {q:'In normal adjustment, magnification of an astronomical telescope is:',o:['f_e/f_o','f_o/f_e','f_o + f_e','f_o − f_e'],c:1,ex:'Normal adjustment (image at infinity): m = f_o/f_e.'},
 {q:'For high magnification in a TELESCOPE you need:',o:['Both small','Both large','Large f_o, small f_e','Small f_o, large f_e'],c:2,ex:'Telescope: large objective focal length, small eyepiece focal length.'},
 {q:'The objective of a refracting astronomical telescope has:',o:['Small f and small aperture','Large f and large aperture','Small f and large aperture','Large f and small aperture'],c:1,ex:'Large aperture (light + resolution) and large focal length (magnification).'},
 {q:'Which is WRONG about a reflecting telescope?',o:['It uses a concave mirror objective','It is free of chromatic aberration','It suffers strong chromatic aberration','Large mirrors are easier to support'],c:2,ex:'Mirrors do not disperse light, so there is NO chromatic aberration — the statement is the wrong one.'},
 {q:'The chief advantage of a reflecting over a refracting telescope is:',o:['It is smaller','No chromatic aberration','It gives an erect image','It needs no eyepiece'],c:1,ex:'A mirror objective removes chromatic aberration entirely.'},
 {q:'The eyepiece of a compound microscope behaves as a:',o:['Plane mirror','Simple microscope','Concave mirror','Prism'],c:1,ex:'It magnifies the objective\u2019s real image, acting as a simple microscope.'},
 {q:'In normal adjustment of a telescope, the final image is formed at:',o:['The near point','Infinity','The focus of the objective','The optical centre'],c:1,ex:'Normal adjustment = relaxed eye = final image at infinity.'},
 {q:'A converging lens forms a virtual, erect, magnified image when the object is:',o:['Beyond 2F','At 2F','Between F and 2F','Within the focal length'],c:3,ex:'Object inside F → virtual erect magnified image (the simple-microscope case).'},
 {q:'A Galilean telescope produces an erect image because its eyepiece is:',o:['A convex lens','A concave lens','A plane mirror','A prism'],c:1,ex:'The concave (diverging) eyepiece of a Galilean telescope gives an erect final image.'},
 {q:'Resolving power of a telescope:',o:['Decreases with aperture','Increases with aperture','Is independent of aperture','Increases with wavelength'],c:1,ex:'RP = D/1.22λ — a larger aperture D improves resolution.'},
 {q:'Assertion: Big telescopes use mirrors not lenses. Reason: Mirrors avoid chromatic aberration and large mirrors are easier to make and support.',o:['Both true, reason explains','Both true, reason does not explain','Assertion true, reason false','Both false'],c:0,ex:'The reason directly explains why reflectors are preferred for large telescopes.'},
 {q:'A terrestrial telescope differs from an astronomical one by having:',o:['Two objectives','An extra erecting lens for an erect image','A concave objective','No eyepiece'],c:1,ex:'An erecting lens makes the final image erect for viewing earthly objects.'}
],
gen:[
 ()=>{const f=rnd(2,10);const m=1+25/f;return{q:`Simple microscope, lens of f=${f} cm, image at the near point (25 cm). Magnifying power?`,o:[`${m.toFixed(1)}`,`${(25/f).toFixed(1)}`,`${(f/25).toFixed(2)}`,`${(1+f/25).toFixed(2)}`],c:0,ex:`m = 1 + D/f = 1 + 25/${f} = ${m.toFixed(1)}.`};},
 ()=>{const f=rnd(2,10);const m=25/f;return{q:`Simple microscope, f=${f} cm, RELAXED eye (image at infinity). Magnification?`,o:[`${m.toFixed(1)}`,`${(1+25/f).toFixed(1)}`,`${(f/25).toFixed(2)}`,`${(25*f)}`],c:0,ex:`Relaxed eye: m = D/f = 25/${f} = ${m.toFixed(1)}.`};},
 ()=>{const fo=rnd(60,200),fe=rnd(2,10);const m=fo/fe;return{q:`Astronomical telescope (normal adjustment): f_o=${fo} cm, f_e=${fe} cm. Magnifying power?`,o:[`${m.toFixed(0)}`,`${(fe/fo).toFixed(3)}`,`${(fo+fe)}`,`${(fo-fe)}`],c:0,ex:`m = f_o/f_e = ${fo}/${fe} = ${m.toFixed(0)}.`};},
 ()=>{const fo=rnd(60,200),fe=rnd(2,10);const L=fo+fe;return{q:`Telescope with f_o=${fo} cm, f_e=${fe} cm in normal adjustment. Tube length?`,o:[`${L} cm`,`${fo-fe} cm`,`${(fo/fe).toFixed(0)} cm`,`${(fo*fe)} cm`],c:0,ex:`L = f_o + f_e = ${fo}+${fe} = ${L} cm.`};},
 ()=>{const f=rnd(5,50);const P=100/f;return{q:`A convex lens has focal length ${f} cm. Its power is:`,o:[`+${P.toFixed(2)} D`,`+${f} D`,`−${P.toFixed(2)} D`,`+${(f/100).toFixed(2)} D`],c:0,ex:`P = 1/f(m) = 100/${f} = +${P.toFixed(2)} D.`};},
 ()=>{const f=rnd(10,30),u=f+rnd(5,40);const v=(u*f/(u-f));const m=v/u;return{q:`Convex lens f=${f} cm, object at ${u} cm. Image distance v?`,o:[`${v.toFixed(1)} cm`,`${(u-f).toFixed(1)} cm`,`${(u+f).toFixed(1)} cm`,`${(f*f/u).toFixed(1)} cm`],c:0,ex:`1/v = 1/f + 1/u → v = uf/(u−f) = ${u}×${f}/${u-f} = ${v.toFixed(1)} cm. (m = ${m.toFixed(2)})`};},
 ()=>{const L=rnd(12,20),fo=rnd(1,3),fe=rnd(3,8);const m=(L/fo)*(25/fe);return{q:`Compound microscope (relaxed eye): tube L=${L} cm, f_o=${fo} cm, f_e=${fe} cm. Magnification ≈`,o:[`${m.toFixed(0)}`,`${(L/fo).toFixed(0)}`,`${(25/fe).toFixed(0)}`,`${(fo*fe)}`],c:0,ex:`m = (L/f_o)(D/f_e) = (${L}/${fo})(25/${fe}) = ${m.toFixed(0)}.`};},

WIDGETS.lens={
 html:id=>`<h4>Convex Lens · Image Formation</h4><p class="d">Slide the object. Inside the focus it gives a magnified VIRTUAL image (the simple-microscope case); outside, a real inverted image.</p>

  <div class="readout" id="${id}_out"></div>`,
 init:id=>{const X0=300,Y0=120,F=80,Ho=46;const uS=document.getElementById(id+'_u');

   const svg=document.getElementById(id+'_svg');const xo=X0-u,oy=Y0-Ho;
   const v=u*F/(u-F);const m=-v/u;const xi=X0+v;const iy=Y0+(-m*Ho);
   let s=`<line x1="20" y1="${Y0}" x2="580" y2="${Y0}" stroke="#cfc6b2"/>
    <ellipse cx="${X0}" cy="${Y0}" rx="11" ry="70" fill="none" stroke="#3b5bdb" stroke-width="2.5"/>
    <circle cx="${X0-F}" cy="${Y0}" r="3" fill="#9c9483"/><text x="${X0-F-6}" y="${Y0+18}" fill="#9c9483" font-size="10" font-family="JetBrains Mono">F</text>
    <circle cx="${X0+F}" cy="${Y0}" r="3" fill="#9c9483"/><text x="${X0+F-4}" y="${Y0+18}" fill="#9c9483" font-size="10" font-family="JetBrains Mono">F</text>
    <line x1="${xo}" y1="${Y0}" x2="${xo}" y2="${oy}" stroke="#2f9e6e" stroke-width="3" marker-end="url(#${id}_a)"/>

<script>

 ]},
 {g:'Cell Potential',pts:[

 ]},

],
flash:[
 ['Cell EMF in terms of electrode potentials?','E°cell = E°cathode − E°anode'],

 ['ΔG° in terms of EMF?','ΔG° = −nFE°cell'],

 ['Strongest reducing agent in the series?','Lithium (most negative E°)'],
 ['Strongest oxidising agent?','Fluorine, F₂ (most positive E°)'],
 ['A more negative E° means the species is a…','Stronger reducing agent / more reactive metal'],

],
quiz:[
 {q:'The standard potential of the SHE is taken as:',o:['+1.0 V','0.00 V','−0.76 V','+0.34 V'],c:1,ex:'SHE is the reference electrode, assigned E° = 0.00 V.'},
 {q:'E°cell is given by:',o:['E°anode − E°cathode','E°cathode − E°anode','E°cathode + E°anode','E°anode × E°cathode'],c:1,ex:'E°cell = E°cathode − E°anode (both reduction potentials).'},
 {q:'A galvanic cell operates spontaneously when E°cell is:',o:['Zero','Negative','Positive','Imaginary'],c:2,ex:'Positive E°cell ⇒ ΔG° negative ⇒ spontaneous.'},

 {q:'The metal with the most negative standard reduction potential is the:',o:['Strongest oxidising agent','Strongest reducing agent','Least reactive metal','Best cathode material'],c:1,ex:'Most negative E° → most easily oxidised → strongest reducing agent (e.g. Li).'},
 {q:'Which metal can displace copper from CuSO₄ solution?',o:['Silver','Gold','Zinc','Platinum'],c:2,ex:'Zn is more reactive (more negative E°) than Cu, so Zn + CuSO₄ → ZnSO₄ + Cu.'},

 {q:'For a single electrode Mⁿ⁺/M, increasing [Mⁿ⁺] makes the electrode potential:',o:['More negative','More positive','Unchanged','Zero'],c:1,ex:'E = E° + (0.0591/n) log[Mⁿ⁺]; higher concentration raises E.'},

 {q:'In the cell notation Zn|Zn²⁺||Cu²⁺|Cu, the copper electrode is the:',o:['Anode','Cathode','Reference','Salt bridge'],c:1,ex:'Right side of the notation is the cathode (reduction): Cu²⁺ + 2e⁻ → Cu.'},
 {q:'Assertion: A cell with E°cell = +1.1 V is spontaneous. Reason: ΔG° = −nFE°cell is negative for positive E°.',o:['Both true, reason explains','Both true, reason does not explain','Assertion true, reason false','Both false'],c:0,ex:'Positive E°cell makes ΔG° negative, which is exactly why it is spontaneous.'},
 {q:'A concentration cell generates EMF due to a difference in:',o:['Electrode materials','Temperature','Ion concentrations','Electrode size'],c:2,ex:'Same electrodes, different concentrations → EMF = (0.0591/n) log(C₂/C₁).'},

gen:[

   if(c[1]<a[1]){const t=a;a=c;c=t;} const E=(c[1]-a[1]);
   return{q:`Cell from ${a[0]} (E°=${a[1]} V) and ${c[0]} (E°=${c[1]} V). E°cell = ?`,o:[`${E.toFixed(2)} V`,`${(a[1]+c[1]).toFixed(2)} V`,`${(a[1]-c[1]).toFixed(2)} V`,`${Math.abs(a[1]*c[1]).toFixed(2)} V`],c:0,ex:`Higher E° is the cathode (${c[0]}). E°cell = E°cat − E°an = ${c[1]} − (${a[1]}) = ${E.toFixed(2)} V.`};},
 ()=>{const n=rnd(1,3),E=(rnd(20,150)/100);const dG=-(n*96500*E)/1000;return{q:`A cell has n=${n} and E°cell=${E.toFixed(2)} V. ΔG° ≈ ? (F=96500)`,o:[`${dG.toFixed(0)} kJ`,`${(-dG).toFixed(0)} kJ`,`${(dG/n).toFixed(0)} kJ`,`${(n*E).toFixed(2)} kJ`],c:0,ex:`ΔG° = −nFE° = −${n}×96500×${E.toFixed(2)} = ${dG.toFixed(0)} kJ (negative → spontaneous).`};},
 ()=>{const n=rnd(1,2),E0=0.34,p=rnd(-4,0);const E=E0+(0.0591/n)*p;return{q:`For Cu²⁺/Cu (E°=+0.34 V, n=${n}), if [Cu²⁺]=10^${p} M, electrode potential E ≈ ?`,o:[`${E.toFixed(3)} V`,`${(E0-(0.0591/n)*p).toFixed(3)} V`,`${E0} V`,`${(E0*p).toFixed(2)} V`],c:0,ex:`E = E° + (0.0591/n)log[Cu²⁺] = 0.34 + (0.0591/${n})(${p}) = ${E.toFixed(3)} V.`};},
 ()=>{const n=rnd(1,3),logK=rnd(2,20);const E=(0.0591/n)*logK;return{q:`If log Kc = ${logK} and n = ${n}, then E°cell ≈ ?`,o:[`${E.toFixed(3)} V`,`${(0.0591*logK).toFixed(3)} V`,`${(logK/n).toFixed(2)} V`,`${(n*logK).toFixed(2)} V`],c:0,ex:`E°cell = (0.0591/n)logKc = (0.0591/${n})×${logK} = ${E.toFixed(3)} V.`};},
 ()=>{const ms=[['Zn',-0.76],['Mg',-2.37],['Fe',-0.44],['Cu',0.34],['Ag',0.80]];const a=ms[rnd(0,4)];let b=ms[rnd(0,4)];while(b[1]===a[1])b=ms[rnd(0,4)];
   const canDisplace=a[1]<b[1];return{q:`Will ${a[0]} (E°=${a[1]}) displace ${b[0]} (E°=${b[1]}) from its salt solution?`,o:[canDisplace?'Yes — it is more reactive':'No — it is less reactive',canDisplace?'No':'Yes','Only on heating','Only in acid'],c:0,ex:`A metal displaces another with a MORE positive E°. ${a[0]} ${canDisplace?'is more negative, so it displaces':'is more positive, so it cannot displace'} ${b[0]}.`};},
 ()=>{const c1=Math.pow(10,rnd(-4,-1)),c2=1;const n=rnd(1,2);const E=(0.0591/n)*Math.log10(c2/c1);return{q:`Concentration cell, n=${n}: dilute side ${c1} M, concentrated side 1 M. EMF ≈ ?`,o:[`${E.toFixed(3)} V`,`${(-E).toFixed(3)} V`,`0 V`,`${(0.0591*n).toFixed(3)} V`],c:0,ex:`EMF = (0.0591/n) log(C₂/C₁) = (0.0591/${n}) log(1/${c1}) = ${E.toFixed(3)} V.`};}
]
});

WIDGETS.nernst={
 html:id=>`<h4>Nernst Equation · E vs concentration</h4><p class="d">For Cu²⁺/Cu (E° = +0.34 V): slide the ion concentration and electron number. E = E° + (0.0591/n)·log[Mⁿ⁺].</p>

   const slope=0.0591/n;const E=E0+slope*p;
   const pts=[];for(let x=-6;x<=0;x++){const px=60+(x+6)/6*490;const Ey=E0+slope*x;const py=120-(Ey-(E0-0.2))/0.3*100;pts.push(`${px},${Math.max(15,Math.min(125,py))}`);}
   const cx=60+(p+6)/6*490,cyE=E0+slope*p,cy=120-(cyE-(E0-0.2))/0.3*100;

WIDGETS.ester={
 html:id=>`<h4>Esterification Mechanism · step-through</h4><p class="d">Acid-catalysed, reversible. Walk the 5 steps (PADPED) of nucleophilic acyl substitution.</p>
  <div class="readout" style="text-align:center;color:#0f8a7e">RCOOH + R\u2032OH &nbsp;⇌&nbsp; RCOOR\u2032 + H₂O &nbsp;(conc. H₂SO₄)</div>
  <div style="display:flex;gap:6px;margin:14px 0;justify-content:center" id="${id}_pills"></div>
  <div class="readout" id="${id}_panel" style="min-height:90px"></div>
  <div class="fcbar" style="margin-top:12px"><button onclick="esterMove('${id}',-1)">‹ Prev</button><span class="prog" id="${id}_prog"></span><button onclick="esterMove('${id}',1)">Next ›</button></div>`,
 init:id=>{window.ESTER=window.ESTER||{};window.ESTER[id]={i:0,steps:[
   ['① Protonation','A H⁺ from the catalyst protonates the carbonyl oxygen of the acid (C=O → C=OH⁺), making the carbonyl carbon strongly electrophilic.'],
   ['② Nucleophilic addition','The oxygen of the alcohol (R\u2032OH), acting as a nucleophile, attacks the electrophilic carbonyl carbon, forming a tetrahedral intermediate.'],
   ['③ Proton transfer','Protons shuffle within the intermediate so that one of the –OH groups becomes –OH₂⁺ — a good leaving group.'],
   ['④ Elimination of water','The –OH₂⁺ leaves as a neutral water molecule, re-forming a C=O⁺ (protonated ester).'],
   ['⑤ Deprotonation','Loss of the extra H⁺ regenerates the acid catalyst and gives the neutral ester RCOOR\u2032. The whole sequence is reversible.']
 ]};esterRender(id);}
};
function esterRender(id){const st=window.ESTER[id];const cur=st.steps[st.i];
 document.getElementById(id+'_pills').innerHTML=st.steps.map((s,i)=>`<span style="font-family:JetBrains Mono;font-size:.72rem;padding:5px 9px;border-radius:8px;border:1px solid ${i===st.i?'#0f8a7e':'#e5ddcb'};color:${i===st.i?'#fff':'#9c9483'};background:${i===st.i?'#0f8a7e':'transparent'}">${i+1}</span>`).join('');
 document.getElementById(id+'_panel').innerHTML=`<b style="color:#0f8a7e;font-family:Fraunces;font-size:1.05rem">${cur[0]}</b><br>${cur[1]}`;
 document.getElementById(id+'_prog').textContent=(st.i+1)+' / '+st.steps.length;}
function esterMove(id,d){const st=window.ESTER[id];st.i=(st.i+d+st.steps.length)%st.steps.length;esterRender(id);}

groups:[
 {g:'Chromosomal Theory',pts:[
  {t:'Chromosomal theory of inheritance',d:'Genes are located on chromosomes; chromosomes carry the hereditary factors of Mendel.',e:'Trick: "Sutton & Boveri SAW genes sitting on chromosomes."'},
  {t:'Proposed by',d:'Walter Sutton and Theodor Boveri (1902).',e:''},
  {t:'The parallelism',d:'Chromosomes and genes both occur in pairs and segregate / assort independently during meiosis — exactly matching Mendel\u2019s factors.',e:'This behavioural match is the core evidence.'},
 ]},
 {g:'Key Terms (foundation)',pts:[
  {t:'Allele',d:'One of the alternative forms of a gene.',e:'T and t are alleles for height.'},
  {t:'Genotype vs phenotype',d:'Genotype = genetic make-up (e.g. Tt); phenotype = observable trait (e.g. tall).',e:''},
  {t:'Homozygous vs heterozygous',d:'Homozygous = identical alleles (TT or tt); heterozygous = different alleles (Tt).',e:''},
  {t:'Mendel\u2019s three laws',d:'Dominance, Segregation (law of purity of gametes), Independent Assortment.',e:'Trick: "DSI". Linkage is the exception to the 3rd law.'},
  {t:'Test cross',d:'Crossing an individual with a homozygous recessive to reveal its genotype — and to detect linkage.',e:'Tt × tt.'},
  {t:'Dihybrid ratio (unlinked)',d:'Independently assorting genes give a 9 : 3 : 3 : 1 F₂ ratio.',e:'Deviation from this hinted at linkage.'},
 ]},
 {g:'Morgan & Drosophila',pts:[
  {t:'Morgan\u2019s organism',d:'Thomas Hunt Morgan worked with the fruit fly, Drosophila melanogaster.',e:''},
  {t:'Why Drosophila?',d:'Short life cycle (~2 weeks), many offspring, cheap to rear, distinct visible mutants, and only 4 pairs of chromosomes.',e:'Trick: "Fast, Fertile, Few (4) chromosomes, Friendly to grow."'},
  {t:'Morgan\u2019s contribution',d:'Confirmed the chromosomal theory and discovered LINKAGE; the "Father of experimental genetics".',e:'Nobel Prize, 1933.'},
 ]},
 {g:'Linkage',pts:[
  {t:'Linkage',d:'Genes located on the SAME chromosome tend to be inherited together.',e:'Trick: "Linked genes Live together on one chromosome."'},
  {t:'Breaks independent assortment',d:'Linked genes do NOT assort independently — the exception to Mendel\u2019s third law.',e:'They give more parental, fewer new combinations.'},
  {t:'Coupling vs repulsion',d:'Coupling (cis): dominant alleles on the same chromosome. Repulsion (trans): on different homologues. (Bateson & Punnett.)',e:''},
  {t:'Complete vs incomplete linkage',d:'Complete = no recombinants; incomplete = some recombinants appear.',e:''},
  {t:'Tight vs loose linkage',d:'Genes close together → very low recombination (tight); far apart → more recombination (loose).',e:'Trick: "Close genes Cling — low recombination."'},
 ]},
 {g:'Recombination & Crossing Over',pts:[
  {t:'Recombination',d:'Formation of new, non-parental combinations of alleles.',e:''},
  {t:'Crossing over',d:'Exchange of segments between non-sister chromatids of homologous chromosomes.',e:'Seen in the Visualize tab.'},
  {t:'When it happens',d:'During pachytene of prophase I of meiosis; the exchange points are chiasmata.',e:''},
  {t:'Recombination frequency (RF)',d:'RF is directly proportional to the distance between two genes on a chromosome.',e:'Farther genes recombine more.'},
  {t:'Map unit (centiMorgan)',d:'1 map unit = 1 cM = <b>1% recombination frequency</b>.',e:'Trick: "1% = 1 cM, named after Morgan."'},
  {t:'First genetic map',d:'Alfred Sturtevant built the first linkage map using recombination frequencies.',e:'Trick: "Sturtevant drew the Street-map of genes."'},
  {t:'Parental &gt; recombinant',d:'For linked genes, parental-type offspring outnumber recombinant types.',e:''},
  {t:'Maximum RF',d:'RF maxes out near 50%; beyond that genes behave as if unlinked (independent).',e:''},
 ]},
 {g:'Morgan\u2019s Dihybrid Cross',pts:[
  {t:'Non-Mendelian ratios',d:'Morgan\u2019s linked-gene crosses gave ratios that departed from 9 : 3 : 3 : 1 — more parentals.',e:''},
  {t:'Distance-dependent recombination',d:'Different linked pairs recombined to different extents, depending on how far apart they sat.',e:'This led directly to gene mapping.'},
 ]},
 {g:'Linkage Groups',pts:[
  {t:'Linkage group',d:'All the genes located on a single chromosome form one linkage group.',e:''},
  {t:'Number of linkage groups',d:'Equals the HAPLOID (n) chromosome number.',e:'Trick: "Linkage groups = n."'},
  {t:'Examples',d:'Humans 23, Drosophila 4, Garden pea 7, Maize 10, Neurospora 7.',e:''},
 ]},
 {g:'Sources of Variation',pts:[
  {t:'Generators of variation',d:'Crossing over, independent assortment, random fertilisation and mutation.',e:''},
  {t:'Mutation',d:'A sudden, heritable change in the DNA sequence or chromosome.',e:''},
 ]}
],

WIDGETS.crossover={
 html:id=>`<h4>Crossing Over → Recombinants</h4><p class="d">Two homologous chromosomes carry genes A–B and a–b. Toggle crossing over to see parental vs recombinant gametes.</p>
  <div class="toggle"><button id="${id}_off" class="on">No crossing over</button><button id="${id}_on">After crossing over</button></div>
  <svg viewBox="0 0 600 150" id="${id}_svg"></svg>
  <div class="readout" id="${id}_out"></div>`,
 init:id=>{let cross=false;
  function draw(){
   const svg=document.getElementById(id+'_svg');
   const top=cross?['#4a8c3f','#4a8c3f','#c47b1e']:['#4a8c3f','#4a8c3f'];
   svg.innerHTML=`<rect x="60" y="35" width="220" height="16" rx="8" fill="#4a8c3f"/><rect x="60" y="60" width="220" height="16" rx="8" fill="#c47b1e"/>
    <text x="48" y="48" fill="#4a8c3f" font-size="12" font-family="JetBrains Mono">A</text><text x="285" y="48" fill="#4a8c3f" font-size="12" font-family="JetBrains Mono">B</text>
    <text x="48" y="73" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">a</text><text x="285" y="73" fill="#c47b1e" font-size="12" font-family="JetBrains Mono">b</text>
    ${cross?'<path d="M170 43 L170 68" stroke="#2d2a24" stroke-width="2" stroke-dasharray="3 2"/><text x="150" y="95" fill="#6c655a" font-size="10">chiasma</text>':''}
    <text x="60" y="25" fill="#9c9483" font-size="10" font-family="JetBrains Mono">homologous pair</text>`;
   const gam=cross
     ?[['AB','parental','#4a8c3f'],['ab','parental','#4a8c3f'],['Ab','recombinant','#c47b1e'],['aB','recombinant','#c47b1e']]
     :[['AB','parental','#4a8c3f'],['ab','parental','#4a8c3f']];
   document.getElementById(id+'_out').innerHTML='Gametes formed:<br>'+gam.map(g=>`<span style="display:inline-block;margin:5px 6px 0 0;font-family:JetBrains Mono;padding:5px 11px;border-radius:8px;border:1px solid ${g[2]};color:${g[2]}">${g[0]} · ${g[1]}</span>`).join('')+(cross?'<br><span style="color:#c47b1e">Crossing over produced 2 new (recombinant) gametes.</span>':'<br><span style="color:#4a8c3f">Without crossing over, only parental gametes form.</span>');}
  document.getElementById(id+'_off').onclick=function(){cross=false;this.classList.add('on');document.getElementById(id+'_on').classList.remove('on');draw();};
  document.getElementById(id+'_on').onclick=function(){cross=true;this.classList.add('on');document.getElementById(id+'_off').classList.remove('on');draw();};
  draw();}
};
WIDGETS.recomb={
 html:id=>`<h4>Gene Distance ↔ Recombination %</h4><p class="d">Slide the two genes apart. The farther they are, the higher the recombination frequency (and the more recombinant gametes).</p>
  <svg viewBox="0 0 600 90" id="${id}_svg"></svg>
  <div class="ctrl"><label>Map distance</label><input type="range" id="${id}_d" min="0" max="50" value="12"><span class="v" id="${id}_dv">12 cM</span></div>
  <svg viewBox="0 0 600 40" id="${id}_bar"></svg>
  <div class="readout" id="${id}_out"></div>`,
 init:id=>{const dS=document.getElementById(id+'_d');
  function u(){const d=+dS.value;document.getElementById(id+'_dv').textContent=d+' cM';
   const x1=80,x2=80+(d/50)*420;
   document.getElementById(id+'_svg').innerHTML=`<rect x="60" y="40" width="480" height="16" rx="8" fill="#4a8c3f"/>
    <circle cx="${x1}" cy="48" r="7" fill="#2d2a24"/><text x="${x1-4}" y="34" fill="#2d2a24" font-size="11" font-family="JetBrains Mono">A</text>
    <circle cx="${x2}" cy="48" r="7" fill="#c47b1e"/><text x="${x2-4}" y="34" fill="#c47b1e" font-size="11" font-family="JetBrains Mono">B</text>`;
   const rf=d;const par=100-rf;const pw=(par/100)*520;
   document.getElementById(id+'_bar').innerHTML=`<rect x="40" y="10" width="${pw}" height="18" rx="4" fill="#4a8c3f"/><rect x="${40+pw}" y="10" width="${520-pw}" height="18" rx="4" fill="#c47b1e"/>
    <text x="44" y="24" fill="#fff" font-size="10" font-family="JetBrains Mono">parental ${par}%</text><text x="${40+pw+6}" y="24" fill="#fff" font-size="10" font-family="JetBrains Mono">recomb ${rf}%</text>`;
   document.getElementById(id+'_out').innerHTML=`Recombination frequency = <span class="big">${rf}%</span> = ${rf} map units (cM).${d>=50?'<br><span style="color:#c47b1e">At ~50% the genes behave as if UNLINKED (independent assortment).</span>':''}`;}
  dS.oninput=u;u();}
};
</script>

<script>
/* ===== ZOOLOGY · EVOLUTION ===== */
App.register('zoology','evolution',{
chapterName:'Evolution',
tagline:'Origin of life, theories, evidences, natural selection, Hardy\u2013Weinberg & human evolution',
widgets:['selection','miller'],
groups:[
 {g:'Origin of Life',pts:[
  {t:'Origin of the universe',d:'The Big Bang (~13.7\u201320 billion years ago) gave an expanding universe; galaxies, stars and planets formed later.',e:''},
  {t:'Timeline of life',d:'Earth formed ~4.5 billion years ago; the first life appeared in water ~3.5\u20134 billion years ago.',e:''},
  {t:'Spontaneous generation (abiogenesis)',d:'The old idea that living things arise repeatedly from non-living matter \u2014 now discredited as an ongoing process.',e:'"Maggots from rotting meat" \u2014 wrong.'},
  {t:'Biogenesis',d:'Life arises only from pre-existing life. Shown by Pasteur\u2019s swan-neck flask (also Redi, Spallanzani).',e:'Pasteur: sterilised broth stayed sterile if air-borne germs were blocked.'},
  {t:'Oparin\u2013Haldane theory',d:'First life arose by CHEMICAL EVOLUTION from simple molecules in a primitive REDUCING atmosphere (a "hot dilute soup"); aggregates called coacervates formed.',e:''},
  {t:'Miller\u2013Urey experiment (1953)',d:'Electric sparks through CH\u2084, NH\u2083, H\u2082 and water vapour produced amino acids \u2014 supporting Oparin\u2013Haldane.',e:'Trick: gases = "MAW-H" (Methane, Ammonia, Water vapour, Hydrogen). NO free O\u2082.'},
  {t:'Sequence of events',d:'Chemical evolution \u2192 first non-cellular life (~3 bya) \u2192 first single cells (~2 bya).',e:''},
 ]},
 {g:'Theories of Evolution',pts:[
  {t:'Lamarckism',d:'Use & disuse of organs + inheritance of acquired characters (e.g. the giraffe stretching its neck).',e:'Trick: "Lamarck = Use it or Lose it, and pass it on."'},
  {t:'Lamarck disproved',d:'Weismann\u2019s mice-tail experiment showed acquired characters are NOT inherited.',e:'Cutting tails for generations never produced tail-less mice.'},
  {t:'Darwinism',d:'Natural selection: over-production \u2192 variation \u2192 struggle for existence \u2192 survival of the fittest. From "On the Origin of Species" (1859).',e:''},
  {t:'Darwin & Wallace',d:'Both independently proposed natural selection; evolution proceeds by branching descent from common ancestors.',e:''},
  {t:'de Vries \u2014 Mutation theory',d:'Evolution occurs by sudden, large, heritable changes (saltation), studied in evening primrose (Oenothera).',e:''},
  {t:'Darwin vs de Vries',d:'Darwin: small, continuous, gradual variations. de Vries: sudden, large, single-step mutations.',e:''},
  {t:'Neo-Darwinism (Modern Synthesis)',d:'Natural selection + mutation + Mendelian genetics + gene flow + genetic drift together explain evolution.',e:''},
 ]},
 {g:'Evidences of Evolution',pts:[
  {t:'Paleontological (fossils)',d:'Fossils in dated rock strata record gradual change of life over time.',e:'Deeper strata = older fossils.'},
  {t:'Connecting links',d:'Organisms sharing features of two groups. Archaeopteryx links reptiles & birds; lungfish links fish & amphibians.',e:''},
  {t:'Homologous organs',d:'Same fundamental structure & origin but different functions \u2192 DIVERGENT evolution from a common ancestor.',e:'Trick: "Same structure \u2192 Diverge."'},
  {t:'Homologous examples',d:'Forelimbs of whale, bat, cheetah and human have the same bone plan.',e:'Also: thorn (Bougainvillea) & tendril (Cucurbita).'},
  {t:'Analogous organs',d:'Different structure & origin but same function \u2192 CONVERGENT evolution.',e:'Trick: "Same job \u2192 Converge."'},
  {t:'Analogous examples',d:'Wings of butterfly & bird; eye of octopus & mammal; flippers of penguin & dolphin; sweet potato (root) & potato (stem).',e:''},
  {t:'Vestigial organs',d:'Reduced, functionless remnants of ancestral structures.',e:'Vermiform appendix, wisdom teeth, nictitating membrane, ear muscles, body hair.'},
  {t:'Embryological evidence',d:'Early embryos of different vertebrates look alike (von Baer). Haeckel\u2019s "ontogeny recapitulates phylogeny" was later refuted.',e:''},
  {t:'Molecular evidence',d:'Similarities in DNA and proteins (e.g. cytochrome c) across species reflect shared ancestry.',e:''},
 ]},
 {g:'Adaptive Radiation',pts:[
  {t:'Adaptive radiation',d:'Evolution of several different species from a single ancestral form into different habitats/niches in a region.',e:''},
  {t:'Darwin\u2019s finches',d:'On the Gal\u00e1pagos, many finches with different beaks evolved from one seed-eating ancestor.',e:'Classic adaptive radiation.'},
  {t:'Australian marsupials',d:'A variety of marsupials radiated from one common ancestor on the isolated continent.',e:''},
  {t:'Two radiations \u2192 convergence',d:'Placental mammals and Australian marsupials independently evolved similar forms (placental wolf vs Tasmanian wolf).',e:'Convergent evolution.'},
 ]},
 {g:'Mechanism & Natural Selection',pts:[
  {t:'Variation',d:'Heritable variation is the raw material of evolution; it arises from mutation and recombination.',e:''},
  {t:'Natural selection',d:'The environment selects favourable variants, which leave more offspring (differential reproduction).',e:''},
  {t:'Darwinian fitness',d:'Fitness = reproductive success \u2014 leaving more surviving offspring, not mere strength.',e:''},
  {t:'Stabilizing selection',d:'Favours the average phenotype and removes both extremes \u2192 variation decreases.',e:'Trick: "Stabilizing \u2192 Stay in the middle." e.g. human birth weight.'},
  {t:'Directional selection',d:'Favours ONE extreme; the population mean shifts that way.',e:'Trick: "Directional \u2192 Drift one way."'},
  {t:'Disruptive selection',d:'Favours BOTH extremes and removes intermediates \u2192 can split a population into two.',e:'Trick: "Disruptive \u2192 Divide in two."'},
  {t:'Industrial melanism',d:'Peppered moth (Biston betularia): after industrial soot darkened trees, dark moths were favoured \u2014 a classic DIRECTIONAL selection (Kettlewell).',e:''},
  {t:'Genetic drift',d:'Random change in allele frequency, significant in SMALL populations. Founder effect (few colonisers) and bottleneck effect (population crash) are special cases.',e:''},
 ]},
 {g:'Hardy\u2013Weinberg Principle',pts:[
  {t:'The principle',d:'In an ideal large population, allele & genotype frequencies stay CONSTANT (genetic equilibrium = no evolution).',e:''},
  {t:'The equations',d:'<span class="f">p + q = 1</span> and <span class="f">p² + 2pq + q² = 1</span> (p² = AA, 2pq = Aa, q² = aa).',e:''},
  {t:'Conditions for equilibrium',d:'No mutation, no migration, no selection, random mating, and a very large population.',e:''},
  {t:'Five disturbing factors',d:'Gene migration (flow), genetic drift, mutation, recombination and natural selection \u2014 any of these breaks equilibrium and causes evolution.',e:'Trick: when equilibrium breaks, evolution happens.'},
 ]},
 {g:'Human Evolution',pts:[
  {t:'Early apes',d:'Dryopithecus (ape-like) and Ramapithecus (more man-like) were early primates.',e:''},

  {t:'Order mnemonic',d:'Sequence: Australopithecus \u2192 habilis \u2192 erectus \u2192 neanderthalensis \u2192 sapiens.',e:'Trick: "A HEN\u2019s Sapiens".'},
  {t:'Trends',d:'Through human evolution, cranial capacity and tool use increased; humans arose in Africa and then migrated.',e:''},
 ]}
],

WIDGETS.selection={
 html:id=>`<h4>Three Types of Natural Selection</h4><p class="d">Toggle each mode \u2014 the dashed grey curve is the starting population; the orange curve is after selection.</p>
  <div class="toggle"><button id="${id}_b0" class="on">Stabilizing</button><button id="${id}_b1">Directional</button><button id="${id}_b2">Disruptive</button></div>
  <svg viewBox="0 0 600 210"><line x1="40" y1="175" x2="560" y2="175" stroke="#cfc6b2"/>
   <text x="300" y="198" fill="#9c9483" font-family="JetBrains Mono" font-size="10" text-anchor="middle">phenotype (trait value) \u2192</text>
   <polyline id="${id}_base" fill="none" stroke="#cfc6b2" stroke-width="2.5" stroke-dasharray="4 3"/>
   <polyline id="${id}_sel" fill="none" stroke="#c2683a" stroke-width="3.5"/></svg>
  <div class="readout" id="${id}_out"></div>`,
 init:id=>{
  function gauss(cx,amp,sd){let p=[];for(let x=40;x<=560;x+=8){const v=amp*Math.exp(-Math.pow((x-cx)/sd,2));p.push(`${x},${175-v}`);}return p.join(' ');}
  function disruptive(){let p=[];for(let x=40;x<=560;x+=8){const v=120*(Math.exp(-Math.pow((x-205)/52,2))+Math.exp(-Math.pow((x-395)/52,2)));p.push(`${x},${175-Math.min(v,150)}`);}return p.join(' ');}
  document.getElementById(id+'_base').setAttribute('points',gauss(300,115,90));
  const modes=[
   {p:gauss(300,150,48),t:'<b>Stabilizing:</b> favours the average and removes both extremes \u2192 variation decreases. (Most common \u2014 e.g. human birth weight.)'},
   {p:gauss(415,140,70),t:'<b>Directional:</b> favours ONE extreme, so the mean shifts. (e.g. industrial melanism in the peppered moth.)'},
   {p:disruptive(),t:'<b>Disruptive:</b> favours BOTH extremes and removes intermediates \u2014 can split a population into two.'}
  ];
  function set(m){document.getElementById(id+'_sel').setAttribute('points',modes[m].p);
   document.getElementById(id+'_out').innerHTML=modes[m].t;
   for(let i=0;i<3;i++)document.getElementById(id+'_b'+i).classList.toggle('on',i===m);}
  for(let i=0;i<3;i++)document.getElementById(id+'_b'+i).onclick=()=>set(i);set(0);}
};
