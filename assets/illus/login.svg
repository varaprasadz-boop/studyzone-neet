<svg viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Open book illustration">
  <defs>
    <linearGradient id="lg-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#aae2cf"/>
      <stop offset="1" stop-color="#1a9479"/>
    </linearGradient>
    <linearGradient id="lg-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#faf5ea"/>
    </linearGradient>
  </defs>

  <ellipse cx="160" cy="160" rx="135" ry="120" fill="url(#lg-back)" opacity="0.20"/>

  <!-- floating dots -->
  <circle cx="55"  cy="65"  r="6" fill="#b8893b" opacity="0.5"/>
  <circle cx="275" cy="75"  r="4" fill="#1a9479" opacity="0.6"/>
  <circle cx="290" cy="200" r="8" fill="#aae2cf" opacity="0.6"/>
  <circle cx="35"  cy="210" r="5" fill="#b8893b" opacity="0.4"/>

  <!-- open book -->
  <g transform="translate(80,100)">
    <path d="M 0 0 Q 80 -10 160 0 L 160 120 Q 80 130 0 120 Z" fill="#0d5d4d"/>
    <path d="M 4 4   Q 40 -2  78 6   L 78 116  Q 40 124 4 118 Z"  fill="url(#lg-page)" stroke="#e5ddcb" stroke-width="0.5"/>
    <path d="M 82 6  Q 120 -2 156 4  L 156 118 Q 120 124 82 116 Z" fill="url(#lg-page)" stroke="#e5ddcb" stroke-width="0.5"/>
    <g stroke="#aae2cf" stroke-width="1.6" stroke-linecap="round" opacity="0.75">
      <line x1="12" y1="22" x2="68" y2="22"/>
      <line x1="12" y1="34" x2="62" y2="34"/>
      <line x1="12" y1="46" x2="68" y2="46"/>
      <line x1="12" y1="58" x2="55" y2="58"/>
    </g>
    <g stroke="#aae2cf" stroke-width="1.6" stroke-linecap="round" opacity="0.75">
      <line x1="90" y1="22" x2="146" y2="22"/>
      <line x1="90" y1="34" x2="138" y2="34"/>
      <line x1="90" y1="46" x2="146" y2="46"/>
      <line x1="90" y1="58" x2="135" y2="58"/>
    </g>
    <!-- a highlighted formula chip on the right page -->
    <rect x="90" y="76" width="56" height="20" rx="6" fill="#1a9479" opacity="0.15"/>
    <text x="118" y="91" font-family="JetBrains Mono, monospace" font-size="11" fill="#10765f" text-anchor="middle">F = ma</text>
  </g>

  <!-- big sparkle / spark -->
  <g transform="translate(220,60)">
    <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z" fill="#b8893b"/>
  </g>
  <g transform="translate(95,75)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#1a9479" opacity="0.75"/>
  </g>
</svg>
