<svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Empty state">
  <defs>
    <linearGradient id="e-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#faf5ea"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="110" rx="100" ry="55" fill="#aae2cf" opacity="0.18"/>
  <!-- floating dots -->
  <circle cx="40"  cy="40"  r="3.5" fill="#b8893b" opacity="0.5"/>
  <circle cx="210" cy="50"  r="3"   fill="#1a9479" opacity="0.6"/>
  <circle cx="220" cy="140" r="4.5" fill="#aae2cf" opacity="0.7"/>
  <circle cx="22"  cy="135" r="3"   fill="#b8893b" opacity="0.4"/>
  <!-- dashed empty card -->
  <g transform="translate(70, 50)">
    <rect x="0" y="0" width="100" height="80" rx="12" fill="url(#e-page)" stroke="#aae2cf" stroke-width="2" stroke-dasharray="6 5"/>
    <line x1="14" y1="22" x2="60" y2="22" stroke="#d5f1e5" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="36" x2="74" y2="36" stroke="#d5f1e5" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="50" x2="50" y2="50" stroke="#d5f1e5" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- sparkle -->
  <g transform="translate(180, 60)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z" fill="#b8893b" opacity="0.85"/>
  </g>
</svg>
